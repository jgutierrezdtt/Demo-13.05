name: "Paso 6: Detectar Terraform corregido"

on:
  push:
    branches: [main]
    paths:
      - 'infra/**.tf'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  detect:
    runs-on: ubuntu-latest
    if: github.actor != 'github-actions[bot]'
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2

      - name: Verificar que estamos en el Paso 6
        id: check-step
        run: |
          if grep -q "Paso 6 de 10" README.md 2>/dev/null; then
            echo "active=true" >> "$GITHUB_OUTPUT"
          else
            echo "active=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Validar misconfigurations corregidas en main.tf
        if: steps.check-step.outputs.active == 'true'
        run: |
          TF="infra/main.tf"
          # 1. No debe tener DB públicamente accesible
          if grep -q "publicly_accessible *= *true" "$TF"; then
            echo "❌ main.tf todavía tiene publicly_accessible = true"
            exit 1
          fi
          # 2. No debe tener almacenamiento sin cifrar
          if grep -q "storage_encrypted *= *false" "$TF"; then
            echo "❌ main.tf todavía tiene storage_encrypted = false"
            exit 1
          fi
          # 3. No debe tener bucket con ACL público
          if grep -qE 'acl[[:space:]]*=[[:space:]]*"public-read"' "$TF"; then
            echo "❌ main.tf todavía tiene acl = \"public-read\""
            exit 1
          fi
          echo "✅ Terraform corregido: sin DB pública, sin almacenamiento sin cifrar, sin bucket público"

      - name: Actualizar README al Paso 7
        if: steps.check-step.outputs.active == 'true'
        uses: actions/github-script@60a0d83039c74a4aee543508d2ffcb1c3799cdea  # v7.0.1
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs');
            const content = fs.readFileSync(
              process.env.GITHUB_WORKSPACE + '/.github/steps/step7.md', 'utf8'
            );
            const encoded = Buffer.from(content).toString('base64');
            const { data: file } = await github.rest.repos.getContent({
              owner: context.repo.owner, repo: context.repo.repo, path: 'README.md'
            });
            await github.rest.repos.createOrUpdateFileContents({
              owner: context.repo.owner, repo: context.repo.repo, path: 'README.md',
              message: '📖 Paso 7 desbloqueado — Secrets Scan',
              content: encoded, sha: file.sha,
              committer: { name: 'github-actions[bot]', email: '41898282+github-actions[bot]@users.noreply.github.com' }
            });
