name: "Paso 5: Detectar IaC scan workflow"

on:
  push:
    branches: [main]
    paths:
      - '.github/workflows/iac-scan.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  detect:
    runs-on: ubuntu-latest
    if: github.actor != 'github-actions[bot]'
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2

      - name: Verificar que estamos en el Paso 5
        id: check-step
        run: |
          if grep -q "Paso 5 de 10" README.md 2>/dev/null; then
            echo "active=true" >> "$GITHUB_OUTPUT"
          else
            echo "active=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Validar iac-scan.yml
        if: steps.check-step.outputs.active == 'true'
        run: |
          if [ ! -f ".github/workflows/iac-scan.yml" ]; then
            echo "❌ No se encontró .github/workflows/iac-scan.yml"
            exit 1
          fi
          if ! grep -qiE "checkov|tfsec|kics" .github/workflows/iac-scan.yml; then
            echo "❌ iac-scan.yml no contiene checkov, tfsec ni kics"
            exit 1
          fi
          echo "✅ iac-scan.yml encontrado con escáner de IaC"

      - name: Actualizar README al Paso 6
        if: steps.check-step.outputs.active == 'true'
        uses: actions/github-script@60a0d83039c74a4aee543508d2ffcb1c3799cdea  # v7.0.1
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs');
            const content = fs.readFileSync(
              process.env.GITHUB_WORKSPACE + '/.github/steps/step6.md', 'utf8'
            );
            const encoded = Buffer.from(content).toString('base64');
            const { data: file } = await github.rest.repos.getContent({
              owner: context.repo.owner, repo: context.repo.repo, path: 'README.md'
            });
            await github.rest.repos.createOrUpdateFileContents({
              owner: context.repo.owner, repo: context.repo.repo, path: 'README.md',
              message: '📖 Paso 6 desbloqueado — IaC Fix',
              content: encoded, sha: file.sha,
              committer: { name: 'github-actions[bot]', email: '41898282+github-actions[bot]@users.noreply.github.com' }
            });
