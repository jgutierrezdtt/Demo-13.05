name: "Paso 8: Detectar supresión gobernada"

on:
  push:
    branches: [main]
    paths:
      - 'src/app.py'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  detect:
    runs-on: ubuntu-latest
    if: github.actor != 'github-actions[bot]'
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2

      - name: Verificar que estamos en el Paso 8
        id: check-step
        run: |
          if grep -q "Paso 8 de 10" README.md 2>/dev/null; then
            echo "active=true" >> "$GITHUB_OUTPUT"
          else
            echo "active=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Validar supresión con gobernanza
        if: steps.check-step.outputs.active == 'true'
        run: |
          APP="src/app.py"
          if ! grep -q "nosemgrep" "$APP"; then
            echo "❌ src/app.py no tiene directiva nosemgrep"
            exit 1
          fi
          if ! grep -qE "SEC-[0-9]+" "$APP"; then
            echo "❌ src/app.py no tiene referencia a ticket SEC-XXX"
            exit 1
          fi
          echo "✅ Supresión correcta: nosemgrep + referencia de ticket SEC-"

      - name: Actualizar README al Paso 9
        if: steps.check-step.outputs.active == 'true'
        uses: actions/github-script@60a0d83039c74a4aee543508d2ffcb1c3799cdea  # v7.0.1
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs');
            const content = fs.readFileSync(
              process.env.GITHUB_WORKSPACE + '/.github/steps/step9.md', 'utf8'
            );
            const encoded = Buffer.from(content).toString('base64');
            const { data: file } = await github.rest.repos.getContent({
              owner: context.repo.owner, repo: context.repo.repo, path: 'README.md'
            });
            await github.rest.repos.createOrUpdateFileContents({
              owner: context.repo.owner, repo: context.repo.repo, path: 'README.md',
              message: '📖 Paso 9 desbloqueado — Exceptions Policy',
              content: encoded, sha: file.sha,
              committer: { name: 'github-actions[bot]', email: '41898282+github-actions[bot]@users.noreply.github.com' }
            });
